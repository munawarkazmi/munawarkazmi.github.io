<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 300" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#0f2f52"/>
    </marker>
  </defs>
  <rect width="980" height="300" fill="#ffffff"/>
  <text x="490" y="34" text-anchor="middle" font-size="19" font-weight="700" fill="#0f2f52">Detection pipeline: deterministic C++, no OpenCV, no ML runtime</text>

  <rect x="30" y="90" width="165" height="105" rx="14" fill="#f3ecd8" stroke="#c8a24c" stroke-width="2"/>
  <text x="112" y="125" text-anchor="middle" font-size="15" font-weight="700" fill="#0f2f52">ESP32-CAM</text>
  <text x="112" y="148" text-anchor="middle" font-size="12" fill="#4b5a6a">OV2640 sensor</text>
  <text x="112" y="166" text-anchor="middle" font-size="12" fill="#4b5a6a">800 × 600 frames</text>

  <rect x="240" y="90" width="175" height="105" rx="14" fill="#eef3f8" stroke="#0f2f52" stroke-width="2"/>
  <text x="327" y="125" text-anchor="middle" font-size="15" font-weight="700" fill="#0f2f52">Block downsample</text>
  <text x="327" y="148" text-anchor="middle" font-size="12" fill="#4b5a6a">800 × 600 → 16 × 12</text>
  <text x="327" y="166" text-anchor="middle" font-size="12" fill="#4b5a6a">mean-luma blocks</text>

  <rect x="460" y="90" width="185" height="105" rx="14" fill="#eef3f8" stroke="#0f2f52" stroke-width="2"/>
  <text x="552" y="125" text-anchor="middle" font-size="15" font-weight="700" fill="#0f2f52">Motion decision</text>
  <text x="552" y="148" text-anchor="middle" font-size="12" fill="#4b5a6a">temporal difference</text>
  <text x="552" y="166" text-anchor="middle" font-size="12" fill="#4b5a6a">adaptive threshold</text>

  <rect x="690" y="90" width="165" height="105" rx="14" fill="#0f2f52"/>
  <text x="772" y="125" text-anchor="middle" font-size="15" font-weight="700" fill="#d8b74e">LoRa mesh alert</text>
  <text x="772" y="148" text-anchor="middle" font-size="12" fill="#dfe7ef">under 3 s over 100 m</text>
  <text x="772" y="166" text-anchor="middle" font-size="12" fill="#8ea0b2">firmware confidential</text>

  <line x1="195" y1="142" x2="232" y2="142" stroke="#0f2f52" stroke-width="2.5" marker-end="url(#arr)"/>
  <line x1="415" y1="142" x2="452" y2="142" stroke="#0f2f52" stroke-width="2.5" marker-end="url(#arr)"/>
  <line x1="645" y1="142" x2="682" y2="142" stroke="#0f2f52" stroke-width="2.5" marker-end="url(#arr)"/>

  <text x="490" y="245" text-anchor="middle" font-size="13.5" fill="#4b5a6a">93.8% detection accuracy across 100+ hours of outdoor field trials · ~240 KB peak RAM (60% below baseline)</text>
  <text x="490" y="272" text-anchor="middle" font-size="12.5" fill="#8a97a5">Commercial prototype, Muxtronics 2025</text>
</svg>
